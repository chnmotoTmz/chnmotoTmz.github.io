services:
  # chanmotocaffe チャンネル (2006378351)
  app-chanmotocaffe:
    build: .
    container_name: line-gemini-hatena-chanmotocaffe
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/appdb
      - PRIMARY_CHANNEL_ID=2006378351
    env_file:
      - .env.production
    volumes: []
    restart: unless-stopped
    command: ["python", "run_app.py"]

  # FX Channel Bot (2007594340)
  app-fx-channel:
    build: .
    container_name: line-gemini-hatena-fx-channel
    ports:
      - "8002:8000"
    depends_on:
      - db
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/appdb
      - PRIMARY_CHANNEL_ID=2007594340
    env_file:
      - .env.production
    volumes: []
    restart: unless-stopped
    command: ["python", "run_app.py"]

  # lang チャンネル (2007819423)
  app-lang:
    build: .
    container_name: line-gemini-hatena-lang
    ports:
      - "8005:8000"
    depends_on:
      - db
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/appdb
      - PRIMARY_CHANNEL_ID=2007819423
    env_file:
      - .env.production
    volumes: []
    restart: unless-stopped
    command: ["python", "run_app.py"]

  db:
    image: postgres:16
    container_name: shared-postgres
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  pgdata:
