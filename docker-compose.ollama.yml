version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    # 初期化時にモデルをダウンロード
    entrypoint: >
      bash -c "
      echo 'Ollama コンテナ起動中...';
      ollama serve &
      sleep 5;
      echo 'Qwen2.5 7B をダウンロード中...';
      ollama pull qwen2.5:7b;
      wait
      "

volumes:
  ollama:
