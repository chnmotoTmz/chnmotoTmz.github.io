<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partnership | chnmoto - Humanoid Media Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .contact-form {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }
        .form-group {
            display: grid;
            gap: 8px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
        }
        .submit-btn {
            background: var(--accent);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body class="humanoid-content">
    <header class="site-header">
        <div class="site-header__inner">
            <a class="brand" href="index.html">Humanoid <span>Media</span> Factory</a>
            <nav class="header-nav">
                <a href="index.html" class="tab">Home</a>
                <a href="about.html" class="tab">About</a>
                <a href="partnership.html" class="tab is-active">提携</a>
            </nav>
        </div>
    </header>

    <main class="wrapper">
        <article class="premium-article">
            <header>
                <h1>Partnership & Contact</h1>
                <div class="meta-date">ヒューマノイド開発・提携のご相談</div>
            </header>
            
            <section>
                <p>
                    次世代のヒューマノイドロボット開発、AIコンテンツパイプラインの導入、技術コンサルティングなど、
                    chnmotoとの提携をご希望の方は、以下のフォームよりお気軽にご連絡ください。
                </p>

                <form action="https://formspree.io/f/mqaebrda" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">お名前 / 貴社名</label>
                        <input type="text" id="name" name="name" required placeholder="例: ヒューマノイド株式会社 山田太郎">
                    </div>
                    <div class="form-group">
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" name="_replyto" required placeholder="example@domain.com">
                    </div>
                    <div class="form-group">
                        <label for="message">ご相談内容</label>
                        <textarea id="message" name="message" rows="5" required placeholder="提携内容、プロジェクト概要、ご予算など"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">メッセージを送信する</button>
                </form>
            </section>
        </article>
    </main>

    <footer>
        <div class="footer-bottom">
            <span>© 2026 chnmotoTmz · Partnership Page</span>
            <span>Powered by Formspree</span>
        </div>
    </footer>
</body>
</html>
