<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連絡先 | chnmoto</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .contact-form {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }

        .form-group {
            display: grid;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 15px;
        }

        .submit-btn {
            background: var(--accent);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 15px;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #form-status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 4px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body class="humanoid-content">
    <header class="site-header">
        <div class="site-header__inner">
            <a class="brand" href="index.html">Humanoid <span>Media</span> Factory</a>
            <nav class="header-nav">
                <a href="index.html" class="tab">Home</a>
                <a href="about.html" class="tab">About</a>
                <a href="partnership.html" class="tab is-active">連絡先</a>
            </nav>
        </div>
    </header>

    <main class="wrapper">
        <article class="premium-article">
            <header>
                <h1>連絡先</h1>
                <div class="meta-date">気軽にどうぞ</div>
            </header>

            <section>
                <p>
                    個人サイトへのご意見や、記事への感想など、なんでもお気軽にどうぞ。
                    お返事できる場合もあれば難しい場合もありますが、読んでいます。
                </p>

                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">お名前</label>
                        <input type="text" id="name" name="name" required placeholder="ニックネームで構いません">
                    </div>
                    <div class="form-group">
                        <label for="email">メールアドレス（任意）</label>
                        <input type="email" id="email" name="email" placeholder="返信不要の場合は空白のままで">
                    </div>
                    <div class="form-group">
                        <label for="category">カテゴリ</label>
                        <select id="category" name="category">
                            <option value="general" selected>感想・雑談</option>
                            <option value="humanoid">ヒューマノイド・技術の話</option>
                            <option value="partnership">その他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">メッセージ</label>
                        <textarea id="message" name="message" rows="5" required placeholder="なんでも"></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="submit-btn">送信する</button>
                </form>
                <div id="form-status"></div>
            </section>
        </article>
    </main>

    <script>
        const form = document.getElementById('contact-form');
        const statusEl = document.getElementById('form-status');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = '送信中...';
            statusEl.style.display = 'none';

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value || 'noreply@no-email.local',
                category: document.getElementById('category').value,
                subject: document.getElementById('category').options[document.getElementById('category').selectedIndex].text,
                message: document.getElementById('message').value
            };

            const NGROK_URL = 'https://eda5-2404-7a84-87c0-1800-c1f6-e390-d7bf-39f7.ngrok-free.app/api/contact';
            const API = window.location.hostname === 'localhost'
                ? 'http://localhost:8084/api/contact'
                : NGROK_URL; // ngrok → localhost:8084 (new-blog-system)

            try {
                const response = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                statusEl.style.display = 'block';
                if (result.success) {
                    statusEl.className = 'status-success';
                    statusEl.textContent = '送信しました。ありがとうございます！';
                    form.reset();
                } else {
                    statusEl.className = 'status-error';
                    statusEl.textContent = 'エラーが発生しました: ' + (result.message || '不明');
                }
            } catch (err) {
                statusEl.style.display = 'block';
                statusEl.className = 'status-error';
                statusEl.textContent = '接続エラー: サーバーにアクセスできませんでした。';
            } finally {
                btn.disabled = false;
                btn.textContent = '送信する';
            }
        });
    </script>

    <footer>
        <div class="footer-bottom">
            <span>© 2026 chnmoto · 個人サイト</span>
        </div>
    </footer>
</body>

</html>
